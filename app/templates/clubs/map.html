{% extends "base.html" %}
{% block title %}Club Map — Cycling Clubs{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  #map { height: calc(100vh - 140px); min-height: 520px; }

  /* Override Leaflet popup chrome to match app design */
  .leaflet-popup-content-wrapper {
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,.15);
    padding: 0;
    overflow: hidden;
    border: 1px solid #dee2e6;
  }
  .leaflet-popup-content { margin: 0; min-width: 220px; }
  .leaflet-popup-tip-container { margin-top: -1px; }

  .club-popup-body { padding: 1rem 1rem .85rem; }
  .club-popup-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.15rem;
    font-weight: 700;
    color: #1b4332;
    margin-bottom: .15rem;
    line-height: 1.2;
  }
  .club-popup-location {
    font-size: .8rem;
    color: #6c757d;
    margin-bottom: .6rem;
  }
  .club-popup-stats {
    display: flex;
    gap: .75rem;
    font-size: .8rem;
    color: #495057;
    margin-bottom: .75rem;
  }
  .club-popup-stat { display: flex; align-items: center; gap: .25rem; }
  .club-popup-footer {
    padding: .6rem 1rem;
    background: #f8fffe;
    border-top: 1px solid #dee2e6;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .club-popup-member-tag {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: #2d6a4f;
    background: #d8f3dc;
    padding: .15rem .45rem;
    border-radius: 4px;
  }
  .club-popup-link {
    font-size: .82rem;
    font-weight: 600;
    color: #e76f51;
    text-decoration: none;
  }
  .club-popup-link:hover { color: #c75c40; text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="page-header" style="padding:1.25rem 0">
  <div class="container d-flex align-items-center justify-content-between flex-wrap gap-3">
    <div>
      <h1 style="font-size:1.8rem;margin-bottom:.1rem">Club Map</h1>
      <p id="map-subtitle" class="mb-0" style="font-size:.9rem">Loading clubs…</p>
    </div>
    <div class="d-flex gap-2 align-items-center">
      <a href="{{ url_for('clubs.index') }}" class="btn btn-outline-light btn-sm">List View</a>
      <button id="locate-btn" class="btn btn-rbc-sm" style="font-size:.85rem;padding:.4rem .9rem">
        &#x1F4CD; Near Me
      </button>
    </div>
  </div>
</div>

<div id="map"></div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WPQ=" crossorigin=""></script>
<script>
(function () {
  const RBC_GREEN  = '#2d6a4f';
  const RBC_ORANGE = '#e76f51';
  const RBC_GRAY   = '#9ca3af';

  const map = L.map('map', { zoomControl: true }).setView([39.5, -98.35], 4);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(map);

  function makeIcon(isMember) {
    const fill   = isMember ? RBC_GREEN : RBC_ORANGE;
    const stroke = isMember ? '#1b4332' : '#c75c40';
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
      <path d="M14 0C6.27 0 0 6.27 0 14c0 9.63 12.5 21.4 13.03 21.9a1.38 1.38 0 0 0 1.94 0C15.5 35.4 28 23.63 28 14 28 6.27 21.73 0 14 0z"
            fill="${fill}" stroke="${stroke}" stroke-width="1.5"/>
      <circle cx="14" cy="14" r="5.5" fill="white" opacity="0.9"/>
    </svg>`;
    return L.divIcon({
      className: '',
      html: svg,
      iconSize:   [28, 36],
      iconAnchor: [14, 36],
      popupAnchor:[0, -34],
    });
  }

  function buildPopup(club) {
    const locationLine = club.city
      ? `<div class="club-popup-location">${club.city}${club.state ? ', ' + club.state : ''}</div>`
      : '';
    const memberTag = club.is_member
      ? `<span class="club-popup-member-tag">&#x2713; Member</span>`
      : '<span></span>';
    return `
      <div class="club-popup-body">
        <div class="club-popup-name">${club.name}</div>
        ${locationLine}
        <div class="club-popup-stats">
          <span class="club-popup-stat">&#x1F6B4; ${club.members} member${club.members !== 1 ? 's' : ''}</span>
          <span class="club-popup-stat">&#x1F4C5; ${club.upcoming} upcoming</span>
        </div>
      </div>
      <div class="club-popup-footer">
        ${memberTag}
        <a href="${club.url}" class="club-popup-link">View Club &rarr;</a>
      </div>`;
  }

  fetch('/api/clubs/map-data')
    .then(r => r.json())
    .then(clubs => {
      const subtitle = document.getElementById('map-subtitle');
      if (clubs.length === 0) {
        subtitle.textContent = 'No geocoded clubs yet.';
        return;
      }
      subtitle.textContent = `${clubs.length} club${clubs.length !== 1 ? 's' : ''} on the map`;

      const latLngs = clubs.map(c => [c.lat, c.lng]);
      map.fitBounds(latLngs, { padding: [48, 48], maxZoom: 11 });

      clubs.forEach(club => {
        L.marker([club.lat, club.lng], { icon: makeIcon(club.is_member) })
          .addTo(map)
          .bindPopup(buildPopup(club), { maxWidth: 300, minWidth: 240 });
      });
    })
    .catch(() => {
      document.getElementById('map-subtitle').textContent = 'Could not load club data.';
    });

  document.getElementById('locate-btn').addEventListener('click', function () {
    this.disabled = true;
    this.textContent = 'Locating…';
    const btn = this;
    if (!navigator.geolocation) {
      alert('Geolocation is not supported by your browser.');
      btn.disabled = false;
      btn.textContent = '📍 Near Me';
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => {
        map.setView([pos.coords.latitude, pos.coords.longitude], 10);
        btn.disabled = false;
        btn.textContent = '📍 Near Me';
      },
      () => {
        alert('Unable to retrieve your location.');
        btn.disabled = false;
        btn.textContent = '📍 Near Me';
      }
    );
  });
}());
</script>
{% endblock %}
