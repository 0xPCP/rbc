<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body { margin: 0; padding: 0; background: #f4f4f4; font-family: Inter, Arial, sans-serif; color: #212529; }
  .wrap { max-width: 560px; margin: 32px auto; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  .header { background: #1b4332; padding: 24px 32px; }
  .header-brand { font-size: 1.1rem; font-weight: 700; color: #fff; letter-spacing: .03em; }
  .header-brand span { color: #52b788; }
  .body { padding: 28px 32px; }
  .club-tag { font-size: .75rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #2d6a4f; margin-bottom: 4px; }
  h1 { font-size: 1.4rem; font-weight: 700; color: #1b4332; margin: 0 0 16px; line-height: 1.25; }
  .meta-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
  .meta-table td { padding: 6px 0; font-size: .9rem; border-bottom: 1px solid #f0f0f0; }
  .meta-table td:first-child { color: #6c757d; width: 40%; }
  .meta-table td:last-child { font-weight: 500; }
  .alert { padding: 12px 16px; border-radius: 6px; font-size: .9rem; margin-bottom: 20px; }
  .alert-danger  { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
  .alert-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
  .alert-info    { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
  .cta { display: inline-block; background: #e76f51; color: #fff; text-decoration: none; font-weight: 600; padding: 10px 24px; border-radius: 6px; font-size: .95rem; margin-top: 4px; }
  .footer { background: #f8f9fa; padding: 16px 32px; font-size: .78rem; color: #9ca3af; border-top: 1px solid #e5e7eb; }
  .footer a { color: #9ca3af; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-brand" style="font-size:1.05rem;font-weight:700;color:#fff;letter-spacing:.03em">paceline<span style="color:#e76f51;font-weight:400">.club</span></div>
  </div>
  <div class="body">
    {% block body %}{% endblock %}
  </div>
  <div class="footer">
    You're receiving this because you signed up for a ride on <a href="https://paceline.club">Paceline</a>.
  </div>
</div>
</body>
</html>
