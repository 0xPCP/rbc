<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 245 56" role="img" aria-label="Paceline">
  <!-- Lead rider (orange — working hardest) -->
  <rect x="0" y="3"  width="48" height="11" rx="5.5" fill="#e76f51"/>
  <!-- Drafting riders (teal — progressively shorter) -->
  <rect x="0" y="18" width="37" height="11" rx="5.5" fill="#0d9488"/>
  <rect x="0" y="33" width="26" height="11" rx="5.5" fill="#0d9488" opacity="0.70"/>
  <rect x="0" y="48" width="15" height="11" rx="5.5" fill="#0d9488" opacity="0.42"/>

  <!-- Wordmark -->
  <text x="60" y="45"
        font-family="'Barlow Condensed', 'Arial Narrow', Arial, sans-serif"
        font-size="42"
        font-weight="700"
        fill="#111827"
        letter-spacing="0.3">paceline</text>
</svg>
