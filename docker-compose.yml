services:
  web:
    build: .
    environment:
      - DATABASE_URL=postgresql://rbc:${DB_PASSWORD}@db:5432/rbc
      - SECRET_KEY=${SECRET_KEY}
      - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID:-}
      - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET:-}
      - STRAVA_CLUB_ID=${STRAVA_CLUB_ID:-}
      - STRAVA_CLUB_REFRESH_TOKEN=${STRAVA_CLUB_REFRESH_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rbc.rule=Host(`cyclingclub.pcp.dev`)"
      - "traefik.http.routers.rbc.entrypoints=websecure"
      - "traefik.http.services.rbc.loadbalancer.server.port=8000"
      - "com.centurylinklabs.watchtower.enable=false"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=rbc
      - POSTGRES_USER=rbc
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rbc"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    external: true
    name: internal

volumes:
  postgres_data:
