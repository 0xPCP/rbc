name: paceline

services:
  web:
    build: .
    environment:
      - DATABASE_URL=postgresql://paceline:${DB_PASSWORD}@paceline-db-1:5432/paceline
      - SECRET_KEY=${SECRET_KEY}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - DONATE_URL=${DONATE_URL:-}
      - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID:-}
      - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET:-}
      - STRAVA_CLUB_ID=${STRAVA_CLUB_ID:-}
      - STRAVA_CLUB_REFRESH_TOKEN=${STRAVA_CLUB_REFRESH_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paceline.rule=Host(`cyclingclub.pcp.dev`)"
      - "traefik.http.routers.paceline.entrypoints=websecure"
      - "traefik.http.services.paceline.loadbalancer.server.port=8000"
      - "com.centurylinklabs.watchtower.enable=false"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=paceline
      - POSTGRES_USER=paceline
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paceline"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    external: true
    name: internal

volumes:
  postgres_data:
    external: true
    name: cyclingclub_postgres_data
